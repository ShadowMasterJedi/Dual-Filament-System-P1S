# Dual Filament Loader
# Port 81  – Dashboard + Moonraker API (til printervælger i hoved-Mainsail)
# Port 8082 – Dedikeret Mainsail UI til S6

upstream feeder_apiserver {
    ip_hash;
    server 127.0.0.1:7126;
}

# ── Port 81: Operator dashboard + Moonraker API ─────────────────
server {
    listen 81;
    listen [::]:81;

    access_log /var/log/nginx/feeder-access.log;
    error_log /var/log/nginx/feeder-error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    client_max_body_size 0;
    proxy_request_buffering off;

    location /websocket {
        proxy_pass http://feeder_apiserver/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    location ~ ^/(printer|api|access|machine|server)/ {
        proxy_pass http://feeder_apiserver$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;
    }

    location = /dashboard.css {
        alias /home/per/Projects/Dual-Filament-System-P1S/web/dashboard.css;
    }

    location = /dashboard.js {
        alias /home/per/Projects/Dual-Filament-System-P1S/web/dashboard.js;
    }

    location / {
        root /home/per/Projects/Dual-Filament-System-P1S/web;
        try_files $uri /dashboard.html;
    }
}

# ── Port 8082: Fuld Mainsail til Dual Filament S6 ─────────────
server {
    listen 8082;
    listen [::]:8082;

    access_log /var/log/nginx/feeder-mainsail-access.log;
    error_log /var/log/nginx/feeder-mainsail-error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    root /home/per/mainsail-dual-filament;
    index index.html;
    server_name _;

    client_max_body_size 0;
    proxy_request_buffering off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location /websocket {
        proxy_pass http://feeder_apiserver/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    location ~ ^/(printer|api|access|machine|server)/ {
        proxy_pass http://feeder_apiserver$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $scheme;
    }
}
