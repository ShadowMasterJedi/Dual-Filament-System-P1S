# ═══════════════════════════════════════════════════════════════
# Dual Filament System – FYSETC S6 v2.1
# Feeder 1 = E0-slot  |  Feeder 2 = E1-slot
# ═══════════════════════════════════════════════════════════════

[include mainsail.cfg]
[include macros.cfg]
[include filament_sensor.cfg]

# ─── FEEDER 1 (aktiv, Spool A) – E0 slot ───────────────────
[manual_stepper feeder1]
step_pin: PC2
dir_pin: PF2
enable_pin: !PA0
microsteps: 16
rotation_distance: 7.710   # Kalibrer – se docs/calibration.md
full_steps_per_rotation: 200
velocity: 25
accel: 200

[tmc2209 manual_stepper feeder1]
uart_pin: PC13              # PDN-UART for E0 på S6 v2.1
run_current: 0.650
stealthchop_threshold: 0
interpolate: True

# ─── FEEDER 2 (standby, Spool B) – E1 slot ─────────────────
[manual_stepper feeder2]
step_pin: PE6
dir_pin: PC0
enable_pin: !PE5
microsteps: 16
rotation_distance: 7.710
full_steps_per_rotation: 200
velocity: 25
accel: 200

[tmc2209 manual_stepper feeder2]
uart_pin: PC14              # PDN-UART for E1 på S6 v2.1
run_current: 0.650
stealthchop_threshold: 0
interpolate: True

# ─── MCU ─────────────────────────────────────────────────────
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_410061000751333134383631-if00

[printer]
kinematics: none
max_velocity: 100
max_accel: 1000
