# ═══════════════════════════════════════════════════════════════
# Dual Filament System – FYSETC S6 v2.1
# Feeder 1 = E0-slot  |  Feeder 2 = E1-slot
# ═══════════════════════════════════════════════════════════════

[include mainsail.cfg]
[include macros.cfg]
[include macros_sensors.cfg]
[include filament_sensor.cfg]

# ─── Feeder 1 – Spool A (E0 driver-slot) ─────────────────────
[extruder feeder1_ex]
heater_pin: PC8
max_power: 0.0
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC9
control: watermark
min_temp: 0
max_temp: 200
min_extrude_temp: 0
nozzle_diameter: 1.75
filament_diameter: 1.75
max_extrude_only_distance: 500
max_extrude_only_velocity: 25
max_extrude_only_accel: 200

[extruder_stepper feeder1]
extruder: feeder1_ex
step_pin: PD5
dir_pin: PD6
enable_pin: !PD4
microsteps: 16
rotation_distance: 7.710

# Standalone – VREF E0: 0,99 V. PDN-EN jumper AF.
#[tmc2209 extruder_stepper feeder1]
#uart_pin: PA15
#run_current: 0.650
#sense_resistor: 0.110
#stealthchop_threshold: 0
#interpolate: True

# ─── Feeder 2 – Spool B (E1 driver-slot) ─────────────────────
[extruder feeder2_ex]
heater_pin: PC10
max_power: 0.0
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC11
control: watermark
min_temp: 0
max_temp: 200
min_extrude_temp: 0
nozzle_diameter: 1.75
filament_diameter: 1.75
max_extrude_only_distance: 500
max_extrude_only_velocity: 25
max_extrude_only_accel: 200

[extruder_stepper feeder2]
extruder: feeder2_ex
step_pin: PE6
dir_pin: !PC13
enable_pin: !PE5
microsteps: 16
rotation_distance: 7.710

# Standalone – VREF E1: 1,01 V. PDN-EN jumper AF.
#[tmc2209 extruder_stepper feeder2]
#uart_pin: PC5
#run_current: 0.650
#sense_resistor: 0.110
#stealthchop_threshold: 0
#interpolate: True

# ─── MCU ─────────────────────────────────────────────────────
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_410061000751333134383631-if00

[printer]
kinematics: none
max_velocity: 100
max_accel: 1000
