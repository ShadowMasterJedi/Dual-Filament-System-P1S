# ═══════════════════════════════════════════════════════════════
# Filament sensorer – 3× switch + 2× motion (BTT SFS V2.0)
# Se hardware/wiring_sensors.md for kabler og test
# ═══════════════════════════════════════════════════════════════

# ─── Sensor A – Spool A (før Feeder 1) ───────────────────────
[filament_switch_sensor sensor_a_switch]
switch_pin: ^PC15
pause_on_runout: False
runout_gcode:
    RUNOUT_A
insert_gcode:
    RESPOND MSG="Spool A: filament detekteret"

[filament_motion_sensor sensor_a_motion]
switch_pin: ^PA0
extruder: feeder1_ex
detection_length: 7.0
pause_on_runout: False
runout_gcode:
    RESPOND MSG="Spool A: jam – ingen filamentbevægelse"

# ─── Sensor B – Spool B (før Feeder 2) ───────────────────────
[filament_switch_sensor sensor_b_switch]
switch_pin: ^PC14
pause_on_runout: False
runout_gcode:
    RUNOUT_B
insert_gcode:
    RESPOND MSG="Spool B: filament detekteret"

[filament_motion_sensor sensor_b_motion]
switch_pin: ^PA1
extruder: feeder2_ex
detection_length: 7.0
pause_on_runout: False
runout_gcode:
    RESPOND MSG="Spool B: jam – ingen filamentbevægelse"

# ─── Downstream – efter Y-splitter (fail-safe) ───────────────
[filament_switch_sensor sensor_downstream]
switch_pin: ^PB12
pause_on_runout: False
runout_gcode:
    SWITCH_TO_B
insert_gcode:
    RESPOND MSG="Downstream: filament OK efter Y-splitter"
