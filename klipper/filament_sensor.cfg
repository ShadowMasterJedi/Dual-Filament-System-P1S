# ═══════════════════════════════════════════════════════════════
# BTT Filament Sensor – monteret efter Y-splitter
# Fuld 5-sensor opsætning: se hardware/wiring_sensors.md
# ═══════════════════════════════════════════════════════════════

[filament_switch_sensor filament_sensor]
switch_pin: ^PB10           # Tjek endstop-pins på S6 v2.1
pause_on_runout: False      # Macro håndterer det
runout_gcode:
    FILAMENT_RUNOUT
insert_gcode:
    RESPOND MSG="Filament indsat – sensor aktiv"
event_delay: 3.0
pause_delay: 0.5
