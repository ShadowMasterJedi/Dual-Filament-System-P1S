# ═══════════════════════════════════════════════════════════════
# Dual Filament Macros – Fuldt autonomt skift
# ═══════════════════════════════════════════════════════════════

[gcode_macro _FEEDER_VARS]
# Tilpas disse til din fysiske opsætning – se docs/calibration.md
variable_retract_dist: 100      # mm: Feeder1 → Y-splitter + buffer
variable_load_dist:    350      # mm: Y-splitter → P1S extruder (MÅL DETTE!)
variable_purge_mm:     50       # mm: purge ved filamentskift
variable_purge_speed:  300      # mm/min
gcode:

[gcode_macro FILAMENT_RUNOUT]
description: Automatisk filamentskift – ingen manuel indgriben
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    M117 Runout! Skifter til Spool B...
    RESPOND MSG="Filament runout – starter automatisk skift"
    PAUSE
    MANUAL_STEPPER STEPPER=feeder1 MOVE=-{vars.retract_dist} SPEED=30
    G4 P1000
    MANUAL_STEPPER STEPPER=feeder2 MOVE={vars.load_dist} SPEED=25
    G4 P500
    PURGE_NOZZLE
    RESUME
    M117 Skift fuldfoert – printer koerer

[gcode_macro PURGE_NOZZLE]
description: Autonomt purge af hotend ved filamentskift
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    M109 S{printer.extruder.target}
    G91
    G1 E{vars.purge_mm} F{vars.purge_speed}
    G1 E-2 F1800
    G90
    G92 E0
    G4 P500

[gcode_macro PRELOAD_B]
description: Før Spool B frem til Y-splitteren (kør inden print)
gcode:
    RESPOND MSG="Preloader Spool B til Y-splitter..."
    MANUAL_STEPPER STEPPER=feeder2 MOVE=100 SPEED=20
    RESPOND MSG="Spool B klar i standby"

[gcode_macro TEST_FEEDER1]
description: Test Feeder 1 – kør 50mm frem
gcode:
    MANUAL_STEPPER STEPPER=feeder1 MOVE=50 SPEED=20

[gcode_macro TEST_FEEDER2]
description: Test Feeder 2 – kør 50mm frem
gcode:
    MANUAL_STEPPER STEPPER=feeder2 MOVE=50 SPEED=20

[gcode_macro RETRACT_FEEDER1]
description: Retract Feeder 1 manuelt
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    MANUAL_STEPPER STEPPER=feeder1 MOVE=-{vars.retract_dist} SPEED=30

[gcode_macro RETRACT_FEEDER2]
description: Retract Feeder 2 manuelt
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    MANUAL_STEPPER STEPPER=feeder2 MOVE=-{vars.retract_dist} SPEED=30
