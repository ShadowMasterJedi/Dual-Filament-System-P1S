# ═══════════════════════════════════════════════════════════════
# Feeder-macros – bevægelse, purge og test
# Sensor-macros: macros_sensors.cfg
# ═══════════════════════════════════════════════════════════════

[gcode_macro _FEEDER_VARS]
variable_retract_dist: 100
variable_load_dist:    350
variable_purge_mm:     50
variable_purge_speed:  300
gcode:

[gcode_macro _MOVE_FEEDER1]
description: Intern – bevaeg Feeder 1 (mm, speed mm/s)
gcode:
    {% set dist = params.DIST|float %}
    {% set speed = params.SPEED|default(20)|float * 60 %}
    ACTIVATE_EXTRUDER EXTRUDER=feeder1_ex
    M83
    G1 E{dist} F{speed}
    M82

[gcode_macro _MOVE_FEEDER2]
description: Intern – bevaeg Feeder 2 (mm, speed mm/s)
gcode:
    {% set dist = params.DIST|float %}
    {% set speed = params.SPEED|default(20)|float * 60 %}
    ACTIVATE_EXTRUDER EXTRUDER=feeder2_ex
    M83
    G1 E{dist} F{speed}
    M82

[gcode_macro PURGE_NOZZLE]
description: Purge-sekvens ved filamentskift (feeder-side)
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    RESPOND MSG="Purge {vars.purge_mm}mm – P1S hotend purges separat"
    _MOVE_FEEDER2 DIST={vars.purge_mm} SPEED=15
    G4 P500

[gcode_macro TEST_FEEDER1]
description: Test Feeder 1 – koer 50 mm frem
gcode:
    _MOVE_FEEDER1 DIST=50 SPEED=20

[gcode_macro TEST_FEEDER2]
description: Test Feeder 2 – koer 50 mm frem
gcode:
    _MOVE_FEEDER2 DIST=50 SPEED=20

[gcode_macro RETRACT_FEEDER1]
description: Retract Feeder 1 manuelt
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    _MOVE_FEEDER1 DIST=-{vars.retract_dist} SPEED=30

[gcode_macro RETRACT_FEEDER2]
description: Retract Feeder 2 manuelt
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    _MOVE_FEEDER2 DIST=-{vars.retract_dist} SPEED=30

[gcode_macro FEEDER1_JOG]
description: Feeder 1 – jog frem (standard 10 mm)
gcode:
    {% set dist = params.DIST|default(10)|float %}
    _MOVE_FEEDER1 DIST={dist} SPEED=20

[gcode_macro FEEDER2_JOG]
description: Feeder 2 – jog frem (standard 10 mm)
gcode:
    {% set dist = params.DIST|default(10)|float %}
    _MOVE_FEEDER2 DIST={dist} SPEED=20

[gcode_macro EMERGENCY_STOP_FEEDERS]
description: Noedstop – deaktiver begge feedere
gcode:
    M84
    RESPOND MSG="Feedere deaktiveret (M84)"
