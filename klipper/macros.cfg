# ═══════════════════════════════════════════════════════════════
# Dual Filament Macros – Fuldt autonomt skift (manual_stepper)
# ═══════════════════════════════════════════════════════════════

[gcode_macro _FEEDER_VARS]
# Tilpas disse til din fysiske opsætning – se docs/calibration.md
variable_retract_dist: 100      # mm: Feeder1 → Y-splitter + buffer
variable_load_dist:    350      # mm: Y-splitter → P1S extruder (MÅL DETTE!)
variable_purge_mm:     50       # mm: purge ved filamentskift
variable_purge_speed:  300      # mm/min
gcode:

[gcode_macro FILAMENT_RUNOUT]
description: Automatisk filamentskift – ingen manuel indgriben
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    M117 Runout! Skifter til Spool B...
    RESPOND MSG="Filament runout – starter automatisk skift"
    PAUSE
    MANUAL_STEPPER STEPPER=feeder1 MOVE=-{vars.retract_dist} SPEED=30
    G4 P1000
    MANUAL_STEPPER STEPPER=feeder2 MOVE={vars.load_dist} SPEED=25
    G4 P500
    PURGE_NOZZLE
    RESUME
    M117 Skift fuldfoert – printer koerer

[gcode_macro PURGE_NOZZLE]
description: Autonomt purge-sekvens ved filamentskift (P1S hotend)
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    RESPOND MSG="Purge {vars.purge_mm}mm – P1S hotend skal purge separat"
    MANUAL_STEPPER STEPPER=feeder2 MOVE={vars.purge_mm} SPEED=15
    G4 P500

[gcode_macro PRELOAD_B]
description: Før Spool B frem til Y-splitteren (kør inden print)
gcode:
    RESPOND MSG="Preloader Spool B til Y-splitter..."
    MANUAL_STEPPER STEPPER=feeder2 MOVE=100 SPEED=20
    RESPOND MSG="Spool B klar i standby"

[gcode_macro TEST_FEEDER1]
description: Test Feeder 1 – kør 50mm frem
gcode:
    MANUAL_STEPPER STEPPER=feeder1 MOVE=50 SPEED=20

[gcode_macro TEST_FEEDER2]
description: Test Feeder 2 – kør 50mm frem
gcode:
    MANUAL_STEPPER STEPPER=feeder2 MOVE=50 SPEED=20

[gcode_macro MOTOR_TEST_E2]
description: Test E2-slot motor - kør 50mm frem
gcode:
    M117 E2 motor-test 50mm
    MANUAL_STEPPER STEPPER=e2_test MOVE=50 SPEED=20

[gcode_macro TEST_E2]
description: Kort alias for MOTOR_TEST_E2
gcode:
    MOTOR_TEST_E2

[gcode_macro RETRACT_FEEDER1]
description: Retract Feeder 1 manuelt
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    MANUAL_STEPPER STEPPER=feeder1 MOVE=-{vars.retract_dist} SPEED=30

[gcode_macro RETRACT_FEEDER2]
description: Retract Feeder 2 manuelt
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    MANUAL_STEPPER STEPPER=feeder2 MOVE=-{vars.retract_dist} SPEED=30

[gcode_macro SYSTEM_STATUS]
description: Vis feeder- og sensorstatus i konsollen
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    {% set sensor = printer["filament_switch_sensor filament_sensor"] %}
    M117 Dual Filament Loader
    RESPOND MSG="=== Dual Filament Status ==="
    RESPOND MSG="Sensor: {% if sensor.filament_detected %}FILAMENT OK{% else %}RUNOUT / TOM{% endif %}"
    RESPOND MSG="Feeder1 aktiv spool | Feeder2 standby preload"
    RESPOND MSG="Retract: {vars.retract_dist}mm | Load: {vars.load_dist}mm | Purge: {vars.purge_mm}mm"

[gcode_macro SIMULATE_RUNOUT]
description: Test runout-sekvens (uden rigtig sensor-trigger)
gcode:
    RESPOND MSG="Simulerer filament runout..."
    FILAMENT_RUNOUT

[gcode_macro FEEDER1_JOG]
description: Feeder 1 – jog frem (standard 10mm)
gcode:
    {% set dist = params.DIST|default(10)|float %}
    MANUAL_STEPPER STEPPER=feeder1 MOVE={dist} SPEED=20

[gcode_macro FEEDER2_JOG]
description: Feeder 2 – jog frem (standard 10mm)
gcode:
    {% set dist = params.DIST|default(10)|float %}
    MANUAL_STEPPER STEPPER=feeder2 MOVE={dist} SPEED=20

[gcode_macro EMERGENCY_STOP_FEEDERS]
description: Nødstop – deaktiver begge feedere
gcode:
    M84
    RESPOND MSG="Feedere deaktiveret (M84)"
