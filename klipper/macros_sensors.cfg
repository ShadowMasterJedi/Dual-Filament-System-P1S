# ═══════════════════════════════════════════════════════════════
# Sensor-macros – spole-runout, skift og status
# ═══════════════════════════════════════════════════════════════

[gcode_macro RUNOUT_A]
description: Spool A tom ved kildesensor – preload Spool B hvis muligt
gcode:
    {% set b = printer["filament_switch_sensor sensor_b_switch"] %}
    M117 Spool A runout
    RESPOND MSG="RUNOUT Spool A – aktiv spole tom"
    {% if b.filament_detected %}
        RESPOND MSG="Spool B har filament – starter preload"
        PRELOAD_B
    {% else %}
        RESPOND MSG="ADVARSEL: Spool B har ogsaa intet filament!"
    {% endif %}

[gcode_macro RUNOUT_B]
description: Spool B tom ved kildesensor
gcode:
    M117 Spool B runout
    RESPOND MSG="RUNOUT Spool B – standby-spole tom (preload ikke mulig)"

[gcode_macro SWITCH_TO_B]
description: Autonomt filamentskift – downstream runout → Spool B
gcode:
    {% set vars = printer["gcode_macro _FEEDER_VARS"] %}
    M117 Skifter til Spool B...
    RESPOND MSG="Downstream runout – autonomt skift til Spool B"
    PAUSE
    _MOVE_FEEDER1 DIST=-{vars.retract_dist} SPEED=30
    G4 P1000
    _MOVE_FEEDER2 DIST={vars.load_dist} SPEED=25
    G4 P500
    PURGE_NOZZLE
    RESUME
    M117 Skift fuldfoert

[gcode_macro PRELOAD_B]
description: Foer Spool B frem til Y-splitteren (koer inden print)
gcode:
    RESPOND MSG="Preloader Spool B til Y-splitter..."
    _MOVE_FEEDER2 DIST=100 SPEED=20
    RESPOND MSG="Spool B klar i standby"

[gcode_macro SENSOR_STATUS]
description: Vis status for alle 5 sensorer
gcode:
    {% set a_sw = printer["filament_switch_sensor sensor_a_switch"] %}
    {% set a_mo = printer["filament_motion_sensor sensor_a_motion"] %}
    {% set b_sw = printer["filament_switch_sensor sensor_b_switch"] %}
    {% set b_mo = printer["filament_motion_sensor sensor_b_motion"] %}
    {% set ds = printer["filament_switch_sensor sensor_downstream"] %}
    M117 Sensor status
    RESPOND MSG="=== Sensor status ==="
    RESPOND MSG="A switch (Spool A): {% if a_sw.filament_detected %}OK{% else %}TOM{% endif %}"
    RESPOND MSG="A motion (Spool A): {% if a_mo.filament_detected %}OK{% else %}STOP/JAM{% endif %}"
    RESPOND MSG="B switch (Spool B): {% if b_sw.filament_detected %}OK{% else %}TOM{% endif %}"
    RESPOND MSG="B motion (Spool B): {% if b_mo.filament_detected %}OK{% else %}STOP/JAM{% endif %}"
    RESPOND MSG="Downstream (Y-split): {% if ds.filament_detected %}OK{% else %}RUNOUT{% endif %}"

[gcode_macro SIMULATE_RUNOUT]
description: Test downstream skift-sekvens (uden sensor-trigger)
gcode:
    RESPOND MSG="Simulerer downstream runout..."
    SWITCH_TO_B
