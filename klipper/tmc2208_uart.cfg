# TMC2208 V2 UART — produktion FYSETC S6 v2.1 (E0 + E1)
# Jumpere: PDN-EN PÅ per slot, 2×4 blok AF
# Aktivér med:  [include tmc2208_uart.cfg]  i printer.cfg

[tmc2208 manual_stepper feeder1]
uart_pin: PA15
run_current: 0.650
hold_current: 0.400
sense_resistor: 0.110
stealthchop_threshold: 999999

[tmc2208 manual_stepper feeder2]
uart_pin: PC5
run_current: 0.650
hold_current: 0.400
sense_resistor: 0.110
stealthchop_threshold: 999999
